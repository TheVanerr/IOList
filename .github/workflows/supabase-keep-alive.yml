name: Supabase Keep-Alive

on:
  schedule:
    # Her 3 günde bir saat 08:00 UTC'de çalışır
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Elle de tetiklenebilir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase'e ping at
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/standart_bom?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Ping başarısız! HTTP $STATUS"
            exit 1
          fi
          echo "Supabase aktif, ping başarılı."
