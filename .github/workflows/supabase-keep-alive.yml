name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu tam gecmisle al
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gerekirse bos keep-alive commit olustur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LAST_COMMIT_EPOCH=$(git log -1 --format=%ct)
          NOW_EPOCH=$(date -u +%s)
          AGE_DAYS=$(((NOW_EPOCH - LAST_COMMIT_EPOCH) / 86400))
          echo "Son commit yasi: ${AGE_DAYS} gun"
          if [ "$AGE_DAYS" -ge 55 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep repo active [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Bos keep-alive commit gonderildi."
          else
            echo "Bos commit gerekmedi."
          fi

      - name: Supabase'e ping at
        run: |
          SUPABASE_URL="https://gkeqdwsxukgejwnoenwk.supabase.co"
          SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZXFkd3N4dWtnZWp3bm9lbndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjE0NTcsImV4cCI6MjA5NDE5NzQ1N30.UQ1nDc64mEt3cpdcCm1JK_TBW88AC44yha1J4aWreVo"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/standart_bom?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "Baglanti kurulamadi!"
            exit 1
          fi
          echo "Supabase aktif, ping basarili (HTTP $STATUS)."