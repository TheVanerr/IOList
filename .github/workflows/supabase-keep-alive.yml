name: Supabase Keep-Alive

on:
  schedule:
    # Her 3 günde bir saat 08:00 UTC'de çalışır
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Elle de tetiklenebilir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase'e ping at
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/standart_bom?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "Bağlantı kurulamadı!"
            exit 1
          fi
          echo "Supabase aktif, ping başarılı (HTTP $STATUS)."
