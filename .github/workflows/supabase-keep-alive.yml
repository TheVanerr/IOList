name: Supabase Keep-Alive

on:
  schedule:
    # Her 3 günde bir saat 08:00 UTC'de çalışır
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Elle de tetiklenebilir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secret varlığı
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "HATA: SUPABASE_URL secret boş veya tanımsız!"
          else
            echo "SUPABASE_URL uzunluğu: ${#SUPABASE_URL} karakter"
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "HATA: SUPABASE_ANON_KEY secret boş veya tanımsız!"
          else
            echo "SUPABASE_ANON_KEY uzunluğu: ${#SUPABASE_ANON_KEY} karakter"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Supabase'e ping at
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          CLEAN_URL=$(echo "$SUPABASE_URL" | tr -d '[:space:]')
          echo "Temizlenmiş URL uzunluğu: ${#CLEAN_URL}"
          STATUS=$(curl -sv -o /dev/null -w "%{http_code}" \
            "${CLEAN_URL}/rest/v1/standart_bom?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" 2>&1 | tail -5)
          echo "Curl çıktısı: $STATUS"
